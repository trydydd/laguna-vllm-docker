services:
  laguna:
    build: .
    image: laguna-nvfp4:latest
    container_name: laguna-nvfp4
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Bind-mounts the host's existing Hugging Face cache so model
      # downloads are reused across runs instead of living in a throwaway
      # anonymous volume. HF_CACHE is written into .env by `make up`.
      - ${HF_CACHE}:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - NUM_SPECULATIVE_TOKENS=${NUM_SPECULATIVE_TOKENS:-15}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS:-32}
    # Matches this DGX Spark's known-working vLLM container config: without
    # privileged mode + host IPC, the CUDA driver rejects Triton's kernel
    # JIT/autotune calls with "operation not permitted" during profile_run,
    # even though basic GPU memory allocation still succeeds.
    privileged: true
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # This box has unified CPU/GPU memory (119 GiB total, no separate VRAM),
    # so a runaway vLLM process eats host RAM directly. A container-wide
    # crash from a hard OOM kill here is recoverable (`docker compose up`);
    # the host silently power-cycling because the OS ran out of memory
    # entirely is not. mem_reservation is a soft target; mem_limit is the
    # hard ceiling that leaves ~19 GiB for the OS, desktop session, and
    # Docker daemon. Pair with GPU_MEMORY_UTILIZATION in entrypoint.sh so
    # vLLM's own target stays under this ceiling.
    deploy:
      resources:
        limits:
          memory: 100g
        reservations:
          memory: 88g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
